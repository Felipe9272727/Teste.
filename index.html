      body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; touch-action: none; overscroll-behavior: none; }
      #root { width: 100vw; height: 100vh; }
      .no-select { user-select: none; -webkit-user-select: none; }
      
      /* Menu Animations */
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.8s ease-out forwards;
      }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes slide-in-right {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-in-right {
        animation: slide-in-right 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes slide-in-left {
        from { opacity: 0; transform: translateX(-40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-in-left {
        animation: slide-in-left 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scale-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* Staggered animation delays */
      .stagger-1 { animation-delay: 0.05s; opacity: 0; }
      .stagger-2 { animation-delay: 0.1s; opacity: 0; }
      .stagger-3 { animation-delay: 0.15s; opacity: 0; }
      .stagger-4 { animation-delay: 0.2s; opacity: 0; }
      .stagger-5 { animation-delay: 0.25s; opacity: 0; }
      
      /* Typewriter effect */
      @keyframes typewriter {
        from { width: 0; }
        to { width: 100%; }
      }
      
      @keyframes blink-caret {
        from, to { border-color: transparent; }
        50% { border-color: #fbbf24; }
      }
      
      /* Glowing border animation */
      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.6); }
      }
      .glow-pulse {
        animation: glow-pulse 2s ease-in-out infinite;
      }
      
      /* Floating animation */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
      
      /* Glitch effect for menu */
      @keyframes glitch {
        0%, 90%, 100% { transform: translate(0); }
        92% { transform: translate(-2px, 2px); }
        94% { transform: translate(2px, -2px); }
        96% { transform: translate(-2px, -2px); }
        98% { transform: translate(2px, 2px); }
      }
      .glitch-hover:hover {
        animation: glitch 0.3s ease-in-out;
      }
      
      /* Shimmer effect */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      
      /* Speech Bubble Animation */
      @keyframes pop-in {
        0% { transform: scale(0); opacity: 0; }
        80% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .speech-bubble {
        animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* Range Slider Styling */
      input[type=range] {
        -webkit-appearance: none; 
        background: transparent; 
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        margin-top: -6px; 
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
      }
      
      /* Custom scrollbar for dialogue */
      .dialogue-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .dialogue-scroll::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
      }
      .dialogue-scroll::-webkit-scrollbar-thumb {
        background: rgba(251, 191, 36, 0.5);
        border-radius: 2px;
      }

    <script type="text/babel" data-type="module" data-presets="react,typescript">
      import React, { useState, useEffect, useRef, useCallback, Suspense, useMemo } from 'react';
      import ReactDOM from 'react-dom/client';
      import { Canvas, useThree, useFrame, createPortal } from '@react-three/fiber';
      import { Html, Loader, Text, useTexture, useGLTF, useAnimations } from '@react-three/drei';
      import * as THREE from 'three';
      import { Vector3, Euler, Quaternion, Matrix4 } from 'three';

      // --- ASSETS & CONFIG ---
      
      const WALKING_URL = "https://raw.githubusercontent.com/Felipe9272727/Bancon...../main/Walking(1).glb";
      const IDLE_URL = "https://raw.githubusercontent.com/Felipe9272727/BACON-PROJETO-FUNCIONALLLLL/main/Idle.glb";

      // NPC Assets
      const NPC_WALK_URL = "https://raw.githubusercontent.com/Felipe9272727/Npc-test/main/npc%20walking.glb";
      const NPC_IDLE_URL = "https://raw.githubusercontent.com/Felipe9272727/Npc-test/main/npc%20idle.glb";

      // Preload assets
      useGLTF.preload(WALKING_URL);
      useGLTF.preload(IDLE_URL);
      useGLTF.preload(NPC_WALK_URL);
      useGLTF.preload(NPC_IDLE_URL);

      // --- DIALOGUE DATA (PORTUGUESE) ---
      
      const DIALOGUE_TREE = {
        "start": {
          "text": "Bem-vindo. Eu sou o Supervisor do Saguão. Este é um elevador normal. Por favor, aja com naturalidade.",
          "options": [
            { "text": "Para onde esse elevador vai?", "next": "destiny" },
            { "text": "Quantos andares existem?", "next": "floors" },
            { "text": "Isso é seguro?", "next": "safety" },
            { "text": "[Sair]", "next": null }
          ]
        },
        "destiny": {
          "text": "Ele vai exatamente para onde você espera. Ou para o andar logo depois do fim.",
          "options": [
            { "text": "O que você quer dizer com isso?", "next": "meaning" },
            { "text": "Existe um andar que não deveria existir?", "next": "forbidden" },
            { "text": "Prefiro não saber.", "next": "ignorance" }
          ]
        },
        "floors": {
          "text": "Existem os andares necessários. Alguns aparecem apenas quando são lembrados com força suficiente.",
          "options": [
            { "text": "Como assim, lembrados?", "next": "memory" },
            { "text": "Posso escolher qualquer um?", "next": "choice" },
            { "text": "Isso não parece normal.", "next": "abnormal" }
          ]
        },
        "safety": {
          "text": "A maioria das pessoas chega inteira. As partes que sobram também são bem tratadas.",
          "options": [
            { "text": "O que você fez com os outros?", "next": "others" },
            { "text": "Quero sair agora.", "next": "exit_demand" },
            { "text": "Você está brincando comigo?", "next": "joke" }
          ]
        },
        "meaning": {
          "text": "Significado é como fumaça neste poço. Concentre-se apenas em subir. E descer. E expandir.",
          "options": [{ "text": "Voltar", "next": "start" }]
        },
        "forbidden": {
          "text": "Se não deveria existir, não podemos falar sobre ele. As paredes têm ouvidos. E bocas.",
          "options": [{ "text": "...", "next": "start" }]
        },
        "ignorance": {
          "text": "Uma escolha sábia. A ignorância é um colete salva-vidas aqui.",
          "options": [{ "text": "Voltar", "next": "start" }]
        },
        "memory": {
          "text": "Memórias são tijolos. Se você esquecer o chão, ele pode deixar de te segurar.",
          "options": [{ "text": "Entendi...", "next": "start" }]
        },
        "choice": {
          "text": "Você pode apertar qualquer botão. Se o botão aceitará seu toque, é outra questão.",
          "options": [{ "text": "Certo.", "next": "start" }]
        },
        "abnormal": {
          "text": "Normal é apenas uma média estatística. Você está fora da curva agora.",
          "options": [{ "text": "Voltar", "next": "start" }]
        },
        "others": {
          "text": "Eles estão por aí. Às vezes nas paredes, às vezes no som do vento nos dutos.",
          "options": [{ "text": "Credo.", "next": "start" }]
        },
        "exit_demand": {
          "text": "A saída é uma porta. Mas nem todas as portas levam para fora.",
          "options": [{ "text": "...", "next": "start" }]
        },
        "joke": {
          "text": "Eu não tenho senso de humor. Fui fabricado sem ele.",
          "options": [{ "text": "Ah.", "next": "start" }]
        }
      };

      // --- AUDIO ENGINE ---
      const LiminalAudioEngine = ({ doorTrigger, audioContext, muted }) => {
        const lobbyReadyRef = useRef(false);
        const masterGainRef = useRef(null);
        const lobbyGainRef = useRef(null);
        const schedulerTimerRef = useRef(null);
        const sourceRef = useRef(null);
        const tracksRef = useRef({
            lobby: { active: true, volume: 1.0, nextNoteTime: 0, beatCount: 0 },
            elevator: { active: false, volume: 0.0, nextNoteTime: 0, beatCount: 0 }
        });
        const crossfadeRef = useRef({ active: false, startTime: 0, duration: 3.0, from: 'lobby', to: 'elevator' });
        const brushBuffersRef = useRef({ accent: null, normal: null });

        const setupReverb = (ctx, destination) => {
            const convolver = ctx.createConvolver();
            const length = ctx.sampleRate * 1.5;
            const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
            for (let i = 0; i < length; i++) {
                const n = i / length;
                const env = Math.pow(1 - n, 3.0);
                impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * env;
                impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * env;
            }
            convolver.buffer = impulse;
            const wetGain = ctx.createGain(); wetGain.gain.value = 0.08;
            const dryGain = ctx.createGain(); dryGain.gain.value = 1.0; 
            const input = ctx.createGain();
            input.connect(convolver); convolver.connect(wetGain); input.connect(dryGain);
            wetGain.connect(destination); dryGain.connect(destination);
            return input;
        };

        const createBrushBuffer = (ctx) => {
            const bufferSize = ctx.sampleRate * 0.05;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
            return buffer;
        };

        const playBrush = (ctx, dest, time, accent, vol = 1.0) => {
            if (!brushBuffersRef.current.normal) {
                brushBuffersRef.current.normal = createBrushBuffer(ctx);
                brushBuffersRef.current.accent = createBrushBuffer(ctx);
            }
            const noise = ctx.createBufferSource();
            noise.buffer = accent ? brushBuffersRef.current.accent : brushBuffersRef.current.normal;
            const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = accent ? 3000 : 2000;
            const gain = ctx.createGain(); gain.gain.setValueAtTime((accent ? 0.08 : 0.03) * vol, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
            noise.connect(filter); filter.connect(gain); gain.connect(dest); noise.start(time);
        };

        const playBass = (ctx, dest, time, freq, duration, vol = 1.0) => {
            if (!Number.isFinite(freq)) return;
            const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, time);
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.3 * vol, time + 0.02); gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
            osc.connect(gain); gain.connect(dest); osc.start(time); osc.stop(time + duration + 0.1);
        };

        const playCheesyOrgan = (ctx, dest, time, freq, duration, vol = 1.0) => {
            if (!Number.isFinite(freq)) return;
            const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, time);
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.12 * vol, time + 0.05); gain.gain.setValueAtTime(0.12 * vol, time + duration - 0.05); gain.gain.linearRampToValueAtTime(0, time + duration);
            osc.connect(gain); gain.connect(dest); osc.start(time); osc.stop(time + duration);
        };

        const playCheesyStrings = (ctx, dest, time, freq, duration, vol = 1.0) => {
            if (!Number.isFinite(freq)) return;
            const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(freq, time);
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 600; 
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.04 * vol, time + 0.5); gain.gain.setValueAtTime(0.04 * vol, time + duration - 0.5); gain.gain.linearRampToValueAtTime(0, time + duration);
            osc.connect(filter); filter.connect(gain); gain.connect(dest); osc.start(time); osc.stop(time + duration);
        };

        const playDoorCloseSound = (ctx, dest) => {
            const t = ctx.currentTime;
            const dingOsc = ctx.createOscillator(); dingOsc.frequency.setValueAtTime(784, t);
            const dingGain = ctx.createGain(); dingGain.gain.setValueAtTime(0.1, t); dingGain.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
            dingOsc.connect(dingGain); dingGain.connect(dest); dingOsc.start(t); dingOsc.stop(t + 2.0);
            const motorOsc = ctx.createOscillator(); motorOsc.type = 'sawtooth'; motorOsc.frequency.setValueAtTime(50, t + 0.2); motorOsc.frequency.linearRampToValueAtTime(40, t + 1.2);
            const motorGain = ctx.createGain(); motorGain.gain.setValueAtTime(0, t + 0.2); motorGain.gain.linearRampToValueAtTime(0.05, t + 0.3); motorGain.gain.linearRampToValueAtTime(0, t + 1.2);
            const motorFilter = ctx.createBiquadFilter(); motorFilter.type = 'lowpass'; motorFilter.frequency.value = 200;
            motorOsc.connect(motorFilter); motorFilter.connect(motorGain); motorGain.connect(dest); motorOsc.start(t + 0.2); motorOsc.stop(t + 1.2);
            const thudOsc = ctx.createOscillator(); thudOsc.type = 'sine'; thudOsc.frequency.setValueAtTime(60, t + 1.1); thudOsc.frequency.exponentialRampToValueAtTime(20, t + 1.3);
            const thudGain = ctx.createGain(); thudGain.gain.setValueAtTime(0, t + 1.1); thudGain.gain.linearRampToValueAtTime(0.2, t + 1.15); thudGain.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
            thudOsc.connect(thudGain); thudGain.connect(dest); thudOsc.start(t + 1.1); thudOsc.stop(t + 1.4);
        };
        
        useEffect(() => {
            if (masterGainRef.current && audioContext) masterGainRef.current.gain.setTargetAtTime(muted ? 0 : 1, audioContext.currentTime, 0.1);
        }, [muted, audioContext]);

        useEffect(() => {
           if (doorTrigger > 0 && audioContext && masterGainRef.current) {
               playDoorCloseSound(audioContext, masterGainRef.current);
               const now = audioContext.currentTime;
               crossfadeRef.current = { active: true, startTime: now, duration: 3.0, from: 'lobby', to: 'elevator' };
               tracksRef.current.elevator.active = true; tracksRef.current.elevator.volume = 0; tracksRef.current.elevator.nextNoteTime = now; tracksRef.current.elevator.beatCount = 0;
           }
        }, [doorTrigger, audioContext]);

        const N = { 'C2': 65.41, 'A2': 110.00, 'D2': 73.42, 'G2': 98.00, 'E3': 164.81, 'G3': 196.00, 'B3': 246.94, 'Db4': 277.18, 'E4': 329.63, 'G4': 392.00, 'F3': 174.61, 'A3': 220.00, 'C4': 261.63, 'D4': 293.66, 'F4': 349.23, 'A4': 440.00 };
        const ELEVATOR_PROGRESSION = [ { root: N.C2, chord: [N.E3, N.G3, N.B3], bass: [N.C2, 82.41, 98.00, 110.00] }, { root: N.A2, chord: [N.Db4, N.E4, N.G4], bass: [N.A2, 138.59, 164.81, 196.00] }, { root: N.D2, chord: [N.F3, N.A3, N.C4], bass: [N.D2, 87.31, 110.00, 130.81] }, { root: N.G2, chord: [N.B3, N.D4, N.F4], bass: [N.G2, 123.47, 146.83, 174.61] } ];
        const melodyMap = [ {0: N.E4, 4: N.G4, 8: N.E4, 12: N.G4}, {0: N.E4, 4: N.G4, 8: N.E4, 12: N.Db4}, {0: N.F4, 4: N.A4, 8: N.F4, 12: N.A4}, {0: N.F4, 4: N.A4, 8: N.F4, 12: N.D4} ];

        const scheduleElevatorClassic = (ctx, dest, beatNumber, time, vol) => {
            const beatVal = 60 / 72; const effectiveVol = vol * 0.6;
            const loopTick = beatNumber % 64; const barIndex = Math.floor(loopTick / 16); const tickInBar = loopTick % 16;
            const harmony = ELEVATOR_PROGRESSION[barIndex];
            if (tickInBar % 4 === 0) playBass(ctx, dest, time, harmony.bass[tickInBar / 4], beatVal * 1.2, effectiveVol);
            if (tickInBar === 0) harmony.chord.forEach((n) => playCheesyStrings(ctx, dest, time, n, beatVal * 4, effectiveVol * 0.5));
            const note = melodyMap[barIndex]?.[tickInBar];
            if (note) playCheesyOrgan(ctx, dest, time, note, beatVal * 0.8, effectiveVol);
            if ([0,3,6,8,12].includes(tickInBar)) playBrush(ctx, dest, time, tickInBar === 0, effectiveVol * 0.3);
        };

        const scheduler = useCallback(() => {
            const ctx = audioContext; if (!ctx) return;
            const dest = masterGainRef.current; if (!dest) return;
            const now = ctx.currentTime; const lookahead = 0.1;

            if (crossfadeRef.current.active) {
                 const { startTime, duration, from, to } = crossfadeRef.current;
                 const elapsed = now - startTime;
                 if (elapsed >= duration) { tracksRef.current[from].active = false; tracksRef.current[from].volume = 0; tracksRef.current[to].volume = 1; crossfadeRef.current.active = false; }
                 else { const t = elapsed / duration; tracksRef.current[from].volume = 1 - t; tracksRef.current[to].volume = t; }
            }
            if (lobbyGainRef.current) lobbyGainRef.current.gain.setTargetAtTime(tracksRef.current.lobby.volume, now, 0.05);
            const elevatorTrack = tracksRef.current.elevator;
            if (elevatorTrack.active) {
                const beatDuration = 60 / 72; const sixteenthTime = beatDuration / 4;
                while (elevatorTrack.nextNoteTime < now + lookahead) {
                     if (elevatorTrack.volume > 0.01) scheduleElevatorClassic(ctx, dest, elevatorTrack.beatCount, elevatorTrack.nextNoteTime, elevatorTrack.volume);
                     elevatorTrack.nextNoteTime += sixteenthTime; elevatorTrack.beatCount++;
                }
            }
        }, [audioContext]);

        useEffect(() => {
            if (!audioContext) return;
            const ctx = audioContext;
            const compressor = ctx.createDynamicsCompressor(); compressor.threshold.value = -12; compressor.ratio.value = 4;
            const makeupGain = ctx.createGain(); makeupGain.gain.value = 1.5; 
            compressor.connect(makeupGain); makeupGain.connect(ctx.destination);
            const reverbInput = setupReverb(ctx, compressor);
            masterGainRef.current = reverbInput;
            const lobbyGain = ctx.createGain(); lobbyGain.gain.value = 1.0; lobbyGain.connect(reverbInput); lobbyGainRef.current = lobbyGain;

            let isMounted = true;
            fetch('https://raw.githubusercontent.com/Felipe9272727/M-sica-pro-meu-jogo/main/Lobby%20Time(MP3_160K).mp3')
                .then(r => r.arrayBuffer()).then(b => ctx.decodeAudioData(b)).then(audioBuf => {
                    if (!isMounted) return;
                    const source = ctx.createBufferSource(); source.buffer = audioBuf; source.loop = true; source.connect(lobbyGain); source.start(0); sourceRef.current = source; lobbyReadyRef.current = true;
                }).catch(e => console.error("Error loading lobby music:", e));

            schedulerTimerRef.current = setInterval(scheduler, 25);
            return () => {
                isMounted = false;
                if (schedulerTimerRef.current) clearInterval(schedulerTimerRef.current);
                if (sourceRef.current) { try { sourceRef.current.stop(); } catch(e) {} sourceRef.current.disconnect(); }
                lobbyGain.disconnect(); reverbInput.disconnect(); compressor.disconnect(); makeupGain.disconnect();
                masterGainRef.current = null; lobbyGainRef.current = null;
            };
        }, [audioContext, scheduler]);
        return null;
      };

      // --- VISUAL JOYSTICK ---
      const VisualJoystick = ({ x, y, active, origin }) => {
        if (!active || !origin) return null;
        const maxRadius = 40; const px = x * maxRadius; const py = y * maxRadius;
        return (
          <div className="absolute pointer-events-none z-50" style={{ left: origin.x, top: origin.y, transform: 'translate(-50%, -50%)' }}>
            <div className="w-32 h-32 rounded-full bg-white/10 border-2 border-white/20 backdrop-blur-sm flex items-center justify-center">
              <div className="w-12 h-12 bg-white/80 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.5)]" style={{ transform: `translate(${px}px, ${py}px)` }} />
            </div>
          </div>
        );
      };
      
      // --- NEW DIALOGUE UI COMPONENT ---
      
      const TypewriterText = ({ text, speed = 30 }) => {
        const [displayedText, setDisplayedText] = useState('');

              clearInterval(timer);

          return () => clearInterval(timer);

      // --- WORLD COMPONENT ---
      const COLORS = { wall: "#FFF9C4", wood: "#8D6E63", floor: "#78909C", ceiling: "#C2A278", metal: "#CFD8DC", elevWood: "#FFE082", elevTrim: "#4E342E", elevFloor: "#EEEEEE", elevCircle: "#FFF59D", elevDoor: "#B0BEC5", elevPanel: "#CFD8DC", grass: "#4CAF50", sky: "#87CEEB", houseWall: "#F5F5F5", houseRoof: "#8D6E63", furniture: "#795548", bed: "#1E88E5", sofa: "#5D4037", light: "#FFF9C4" };

      const TextureMaterial = React.memo(({ url, color = "#ffffff", repeat = [1, 1], roughness = 0.8, metalness = 0.0, bumpScale = 0.0, transparent = false, opacity = 1.0, rotation = 0 }) => {
          const texture = useTexture(url);
          const map = useMemo(() => {
              const cloned = texture.clone(); cloned.wrapS = cloned.wrapT = THREE.RepeatWrapping; cloned.repeat.set(repeat[0], repeat[1]);
              if (rotation !== 0) { cloned.center.set(0.5, 0.5); cloned.rotation = rotation; }
              cloned.needsUpdate = true; return cloned;
          }, [texture, repeat[0], repeat[1], rotation]);
          return <meshStandardMaterial map={map} color={color} roughness={roughness} metalness={metalness} bumpMap={bumpScale > 0 ? map : undefined} bumpScale={bumpScale} transparent={transparent} opacity={opacity} />;
      });

      const Door = React.memo(({ x, z, rot }) => (

      const ElevatorDoors = React.memo(({ closed }) => {
          const leftDoorRef = useRef(null); const rightDoorRef = useRef(null);
          useFrame((state, delta) => {
              if (!leftDoorRef.current || !rightDoorRef.current) return;
              const speed = 5.0 * delta; const targetLeft = closed ? -0.76 : -2.3; const targetRight = closed ? 0.76 : 2.3;
              const lx = leftDoorRef.current.position.x; const rx = rightDoorRef.current.position.x;
              if (Math.abs(lx - targetLeft) < 0.001 && Math.abs(rx - targetRight) < 0.001) return;

                    group.current.rotation.y += diff * 5 * delta;

                        Toque
                      </span>
                      <span className="flex items-center gap-2">
                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15.536a5 5 0 001.414 1.414m2.828-9.9a9 9 0 012.172-1.414" /></svg>
                        Fones

                {/* DESKTOP / LANDSCAPE LAYOUT */}
                <div className="hidden md:flex h-full items-center justify-center pointer-events-auto">
                  <div className="flex items-center gap-10 lg:gap-24 max-w-6xl mx-auto px-8">
                    
                    <div className="relative animate-fade-in" style={{ animationDelay: '0.5s' }}>
                      <div className="w-64 h-96 border-8 border-[#2a2a2a] rounded-t-2xl bg-gradient-to-b from-[#1a1a1a] to-[#0a0a0a] shadow-[inset_0_0_60px_rgba(0,0,0,0.9),0_0_80px_rgba(0,0,0,0.5)]">
                        <div className="absolute inset-4 bg-gradient-to-b from-amber-500/10 via-transparent to-transparent rounded-t-xl" />
                        <div className="absolute top-6 left-1/2 -translate-x-1/2 w-24 h-10 bg-black/90 rounded border border-amber-500/30 flex items-center justify-center shadow-[0_0_20px_rgba(251,191,36,0.3)]">
                          <span className="text-amber-400 text-2xl font-mono font-bold" style={{ textShadow: '0 0 15px rgba(251,191,36,0.8)' }}>▲ 03</span>
                        </div>
                        <div className="absolute bottom-0 left-4 right-4 top-20 flex gap-1 overflow-hidden rounded-t">
                          <div className="flex-1 bg-gradient-to-r from-[#3a3a3a] via-[#404040] to-[#353535] border-t border-l border-white/10 shadow-inner">
                            <div className="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-black/30 to-transparent" />
                          </div>
                          <div className="w-0.5 bg-black/50" />
                          <div className="flex-1 bg-gradient-to-l from-[#3a3a3a] via-[#404040] to-[#353535] border-t border-r border-white/10 shadow-inner">
                            <div className="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-black/30 to-transparent" />
                          </div>
                        </div>
                        <div className="absolute top-20 left-1/2 -translate-x-1/2 w-32 h-16 bg-gradient-to-b from-amber-400/20 to-transparent blur-xl" />
                      </div>
                      <div className="absolute -right-12 top-1/2 -translate-y-1/2 w-8 h-32 bg-[#1a1a1a] rounded-r-lg border border-white/5 flex flex-col items-center justify-center gap-3 shadow-xl">
                        <div className="w-5 h-5 rounded-full bg-gradient-to-br from-amber-400 to-amber-600 shadow-[0_0_15px_rgba(251,191,36,1)] animate-pulse" />
                        <div className="w-5 h-5 rounded-full bg-white/10 border border-white/10" />
                        <div className="w-4 h-8 bg-black/50 rounded-sm mt-2 flex flex-col items-center justify-center">
                          <div className="w-2 h-0.5 bg-amber-500/50 mb-0.5" />
                          <div className="w-2 h-0.5 bg-white/20" />
                        </div>
                      </div>
                      <div className="absolute -bottom-8 left-1/2 -translate-x-1/2 w-80 h-8 bg-gradient-to-t from-transparent to-amber-500/10 blur-md" />
                      <div className="absolute -left-2 top-0 bottom-0 w-2 bg-gradient-to-r from-[#333] to-[#222] rounded-l" />
                      <div className="absolute -right-2 top-0 bottom-0 w-2 bg-gradient-to-l from-[#333] to-[#222] rounded-r" />
                    </div>
                    
                    <div className="flex-1 max-w-lg flex flex-col justify-center">
                      <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-amber-500/10 border border-amber-500/20 rounded-full mb-4 animate-fade-in-up" style={{ animationDelay: '0.7s' }}>
                        <div className="w-2 h-2 bg-amber-400 rounded-full animate-pulse" />
                        <span className="text-amber-400/80 text-xs font-mono uppercase tracking-wider">Andar 03 • Saguão</span>
                      </div>
                      <div className="mb-6 animate-fade-in-up" style={{ animationDelay: '0.8s' }}>
                        <p className="text-amber-500/40 text-sm uppercase tracking-[0.5em] mb-2 font-light">Bem-vindo ao</p>
                        <h1 className="text-5xl lg:text-7xl font-black text-white leading-none mb-1" style={{ textShadow: '0 0 60px rgba(255,255,255,0.1)' }}>
                          THE <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-200">NORMAL</span>
                        </h1>
                        <h2 className="text-3xl lg:text-5xl font-extralight text-white/80 tracking-[0.4em] uppercase">
                          ELEVATOR
                        </h2>
                      </div>
                      <div className="animate-fade-in-up mt-2" style={{ animationDelay: '1s' }}>
                        <button 
                          onClick={onPlay}
                          className="group relative overflow-hidden rounded-xl transition-all duration-500 hover:scale-[1.02] active:scale-[0.98]"
                        >
                          <div className="absolute -inset-0.5 bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-500 rounded-xl opacity-70 group-hover:opacity-100 blur-sm transition-opacity" />
                          <div className="relative bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-500 rounded-xl">
                            <div className="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent rounded-xl" />
                            <div className="relative flex items-center gap-4 px-12 py-5 text-black font-bold text-xl">
                              <span className="tracking-[0.2em] group-hover:tracking-[0.3em] transition-all duration-500">ENTRAR NO SAGUÃO</span>
                              <svg className="w-6 h-6 group-hover:translate-x-2 transition-transform duration-300" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M13.025 1l-2.847 2.828 6.176 6.176h-16.354v3.992h16.354l-6.176 6.176 2.847 2.828 10.975-11z"/>
                              </svg>
                            </div>
                          </div>
                        </button>
                        <div className="flex gap-8 mt-6 text-white/20 text-sm">
                          <span className="flex items-center gap-2">
                            <kbd className="px-2 py-1 bg-white/5 border border-white/10 rounded text-xs font-mono">WASD</kbd>
                            Mover
                          </span>
                          <span className="flex items-center gap-2">
                            <kbd className="px-2 py-1 bg-white/5 border border-white/10 rounded text-xs font-mono">MOUSE</kbd>
                            Olhar
                          </span>
                          <span className="flex items-center gap-2">
                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728" /></svg>
                            Fones
                          </span>
                        </div>
                      </div>
                    </div>
                    
                  </div>
                </div>
                
                <div className="absolute top-6 left-6 text-white/10 text-xs font-mono hidden md:flex items-center gap-2">
                  <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                  SISTEMA ATIVO
                </div>
                <div className="absolute top-6 right-6 text-white/10 text-xs font-mono hidden md:flex items-center gap-2">
                  <span className="text-red-500">●</span> REC
                  <span className="ml-4">CAM_01</span>
                </div>
                <div className="absolute bottom-6 left-6 text-white/10 text-xs font-mono hidden md:block">
                  © 2024 LIMINAL SYSTEMS
                </div>
                <div className="absolute bottom-6 right-6 text-white/10 text-xs font-mono hidden md:block">
                  v1.0.3
                </div>
                
              </div>
              
              <div className="absolute inset-0 pointer-events-none opacity-[0.02]" style={{
                backgroundImage: 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px)'
              }} />
              
            </div>
        );
      };

      const MAX_JOYSTICK_RADIUS = 50; 
      const GameApp = () => {
        const [hasStarted, setHasStarted] = useState(false);
        const [audioCtx, setAudioCtx] = useState(null);
        const [muted, setMuted] = useState(false);
        const [zoomLevel, setZoomLevel] = useState(4.0);
        const prevPinchDist = useRef(null);
        const moveInput = useRef({ x: 0, y: 0 }); const lookInput = useRef({ x: 0, y: 0 });
        const sharedPlayerPositionRef = useRef(new Vector3(0, 0, 8)); 
        const [elevatorTimer, setElevatorTimer] = useState(null); const [doorsClosed, setDoorsClosed] = useState(false);
        const [currentLevel, setCurrentLevel] = useState(0); const [overlayOpacity, setOverlayOpacity] = useState(0);
        const [houseDoorOpen, setHouseDoorOpen] = useState(false); const [canInteractDoor, setCanInteractDoor] = useState(false); const [doorSoundTrigger, setDoorSoundTrigger] = useState(0);
        const npcPositionRef = useRef(new Vector3(5, 0, 5)); const [canInteractNPC, setCanInteractNPC] = useState(false); const [dialogueOpen, setDialogueOpen] = useState(false); const [dialogueNode, setDialogueNode] = useState('start');
        
        const handlePlayerEnterElevator = () => { if (elevatorTimer === null && !doorsClosed && currentLevel === 0) { setElevatorTimer(5); } };
        const handleInteractionUpdate = useCallback((canInteract) => { setCanInteractDoor(prev => { if (prev !== canInteract) return canInteract; return prev; }); }, []);
        const handleNpcInteractionUpdate = useCallback((canInteract) => { setCanInteractNPC(prev => { if (prev !== canInteract) return canInteract; return prev; }); }, []);
        const handleOpenDoor = () => { if (navigator.vibrate) navigator.vibrate(50); setHouseDoorOpen(true); setCanInteractDoor(false); };
        const handleStartDialogue = () => { if (navigator.vibrate) navigator.vibrate(30); setDialogueNode('start'); setDialogueOpen(true); setCanInteractNPC(false); };
        const handleDialogueOption = (next) => { setDialogueNode(next); };
        const handleCloseDialogue = () => { setDialogueOpen(false); };
        const handleStartGame = () => { const AudioContext = window.AudioContext || window.webkitAudioContext; const ctx = new AudioContext(); ctx.resume(); setAudioCtx(ctx); setHasStarted(true); if (typeof window !== 'undefined' && window.matchMedia("(min-width: 1024px)").matches) { try { document.body.requestPointerLock(); } catch(e) {} } };

        useEffect(() => {
          let timerId;
          if (elevatorTimer !== null && elevatorTimer > 0) {
              timerId = setTimeout(() => { setElevatorTimer(prev => (prev !== null ? prev - 1 : null)); }, 1000);
              if (doorsClosed) {
                  if (elevatorTimer === 19) { setOverlayOpacity(1); }
                  if (elevatorTimer === 18) { if (currentLevel === 0) { setCurrentLevel(1); } }
                  if (elevatorTimer === 17) { setOverlayOpacity(0); }
              }
          } else if (elevatorTimer === 0) {
              if (!doorsClosed) { setDoorsClosed(true); setElevatorTimer(20); setDoorSoundTrigger(prev => prev + 1); } 
              else { setDoorsClosed(false); setElevatorTimer(null); setOverlayOpacity(0); }
          }
          return () => clearTimeout(timerId);
        }, [elevatorTimer, doorsClosed, currentLevel]);
        
        const [joystickVisual, setJoystickVisual] = useState({ active: false, originX: 0, originY: 0, currentX: 0, currentY: 0 });
        const [isDesktop, setIsDesktop] = useState(() => typeof window !== 'undefined' && window.matchMedia("(min-width: 1024px)").matches);
        const activePointers = useRef(new Map());

        useEffect(() => {
          const mq = window.matchMedia("(min-width: 1024px)");
          const handler = (e) => setIsDesktop(e.matches);
          mq.addEventListener('change', handler);
          return () => mq.removeEventListener('change', handler);
        }, []);

        const handlePointerDown = (e) => {
          if (!hasStarted) return;
          if (isDesktop) { if (document.pointerLockElement !== document.body && !dialogueOpen) { document.body.requestPointerLock(); } return; }
          if (dialogueOpen) return;
          e.preventDefault(); e.stopPropagation();
          const { pointerId, clientX, clientY } = e; const screenW = window.innerWidth; const screenH = window.innerHeight;
          const isPortrait = screenH > screenW; const zoneLimit = isPortrait ? 0.5 : 0.4;
          if (clientX < screenW * zoneLimit) {
            const hasMove = Array.from(activePointers.current.values()).some((p) => p.type === 'move');
            activePointers.current.set(pointerId, { type: hasMove ? 'aux' : 'move', startX: clientX, startY: clientY, currX: clientX, currY: clientY });
            if (!hasMove) { setJoystickVisual({ active: true, originX: clientX, originY: clientY, currentX: 0, currentY: 0 }); moveInput.current = { x: 0, y: 0 }; }
          } else {
            const hasLook = Array.from(activePointers.current.values()).some((p) => p.type === 'look');
            activePointers.current.set(pointerId, { type: hasLook ? 'aux' : 'look', startX: clientX, startY: clientY, currX: clientX, currY: clientY });
          }
          if (activePointers.current.size === 2) { prevPinchDist.current = null; }
        };

        const handlePointerMove = (e) => {
          if (!hasStarted) return;
          if (isDesktop) { if (document.pointerLockElement === document.body && !dialogueOpen) { lookInput.current.x += e.movementX; lookInput.current.y += e.movementY; } return; }
          e.preventDefault(); e.stopPropagation();
          const { pointerId, clientX, clientY } = e; const pointer = activePointers.current.get(pointerId);
          if (pointer) {
            pointer.currX = clientX; pointer.currY = clientY;
            const types = Array.from(activePointers.current.values()).map(p => p.type);
            const isDualStick = types.includes('move') && types.includes('look');
            const isPinching = activePointers.current.size === 2 && !isDualStick;
            if (!isPinching) {
                if (pointer.type === 'move') {
                  const dx = clientX - pointer.startX; const dy = clientY - pointer.startY;
                  const dist = Math.sqrt(dx*dx + dy*dy); const angle = Math.atan2(dy, dx);
                  const cappedDist = Math.min(dist, MAX_JOYSTICK_RADIUS);
                  const visualX = Math.cos(angle) * cappedDist; const visualY = Math.sin(angle) * cappedDist;
                  let normX = visualX / MAX_JOYSTICK_RADIUS; let normY = visualY / MAX_JOYSTICK_RADIUS;
                  moveInput.current = { x: normX, y: normY };
                  setJoystickVisual(prev => ({ ...prev, currentX: normX, currentY: normY }));
                } else if (pointer.type === 'look') {
                  const deltaX = clientX - pointer.startX; const deltaY = clientY - pointer.startY;
                  const SENSITIVITY = 0.006; lookInput.current.x += deltaX * SENSITIVITY; lookInput.current.y += deltaY * SENSITIVITY;
                  pointer.startX = clientX; pointer.startY = clientY;
                }
            }
            if (isPinching && !dialogueOpen) {
                const points = Array.from(activePointers.current.values()); const p1 = points[0]; const p2 = points[1];
                const dist = Math.sqrt(Math.pow(p1.currX - p2.currX, 2) + Math.pow(p1.currY - p2.currY, 2));
                if (prevPinchDist.current !== null) { const delta = dist - prevPinchDist.current; const zoomSpeed = 0.02; setZoomLevel(prev => Math.min(Math.max(prev - delta * zoomSpeed, 0), 10.0)); }
                prevPinchDist.current = dist;
            }
          }
        };

        const handlePointerUp = (e) => {
          if (!hasStarted) return; if (isDesktop) return; e.preventDefault(); const { pointerId } = e;
          const pointer = activePointers.current.get(pointerId);
          if (pointer) { if (pointer.type === 'move') { moveInput.current = { x: 0, y: 0 }; setJoystickVisual(prev => ({ ...prev, active: false })); } activePointers.current.delete(pointerId); }
          if (activePointers.current.size < 2) { prevPinchDist.current = null; }
        };

        const handleWheel = (e) => { if (!hasStarted || dialogueOpen) return; setZoomLevel(prev => Math.min(Math.max(prev + e.deltaY * 0.01, 0), 10.0)); };

        useEffect(() => {
          if (!isDesktop) return; if (!hasStarted) return;
          if (dialogueOpen) { document.exitPointerLock(); return; }
          const keys = { w: false, a: false, s: false, d: false };
          const updateInput = () => { let x = 0; let y = 0; if (keys.w) y -= 1; if (keys.s) y += 1; if (keys.a) x -= 1; if (keys.d) x += 1; moveInput.current.x = x; moveInput.current.y = y; };
          const handleKeyDown = (e) => { if (dialogueOpen) return; switch(e.key.toLowerCase()) { case 'w': keys.w = true; break; case 'a': keys.a = true; break; case 's': keys.s = true; break; case 'd': keys.d = true; break; } updateInput(); };
          const handleKeyUp = (e) => { switch(e.key.toLowerCase()) { case 'w': keys.w = false; break; case 'a': keys.a = false; break; case 's': keys.s = false; break; case 'd': keys.d = false; break; } updateInput(); };
          window.addEventListener('keydown', handleKeyDown); window.addEventListener('keyup', handleKeyUp);
          return () => { window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp); };
        }, [isDesktop, hasStarted, dialogueOpen]);

        return (
          <div className="w-full h-full relative overflow-hidden select-none" style={{ touchAction: 'none', backgroundColor: '#000000' }} onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} onPointerLeave={handlePointerUp} onWheel={handleWheel}>
            <LiminalAudioEngine doorTrigger={doorSoundTrigger} audioContext={audioCtx} muted={muted} />
            <div className="absolute inset-0 z-30 bg-black pointer-events-none transition-opacity duration-1000 ease-in-out" style={{ opacity: overlayOpacity }} />
            <Canvas shadows camera={{ fov: 75, near: 0.1, far: 100 }}>
              <Suspense fallback={<Html center><div className="text-white font-mono">Loading...</div></Html>}>
                  <World timer={elevatorTimer} doorsClosed={doorsClosed} level={currentLevel} houseDoorOpen={houseDoorOpen} npcPositionRef={npcPositionRef} isPaused={dialogueOpen} playerPositionRef={sharedPlayerPositionRef} />
                  <Player active={hasStarted} moveInput={moveInput} lookInput={lookInput} isDesktop={isDesktop} onEnterElevator={handlePlayerEnterElevator} doorsClosed={doorsClosed} currentLevel={currentLevel} onInteractionUpdate={handleInteractionUpdate} onNpcInteractionUpdate={handleNpcInteractionUpdate} houseDoorOpen={houseDoorOpen} zoomLevel={zoomLevel} npcPositionRef={npcPositionRef} dialogueOpen={dialogueOpen} sharedPositionRef={sharedPlayerPositionRef} />
              </Suspense>
            </Canvas>
            <Loader containerStyles={{ background: '#050505' }} innerStyles={{ background: '#1a1a1a', width: '300px', height: '6px', borderRadius: '3px' }} barStyles={{ background: 'linear-gradient(90deg, #f59e0b, #fbbf24)', height: '100%', borderRadius: '3px' }} dataStyles={{ color: '#f59e0b', fontFamily: 'monospace', fontSize: '14px' }} dataInterpolation={(p) => `Carregando... ${p.toFixed(0)}%`} />
            {!hasStarted && <MainMenu onPlay={handleStartGame} />}
            {hasStarted && ( <div className="absolute top-4 right-4 z-50 flex gap-4"><button onClick={() => setMuted(!muted)} className="text-white bg-black/50 p-2 rounded-full hover:bg-white/20 transition-colors pointer-events-auto">{muted ? (<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M17.25 9.75 19.5 12m0 0 2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6 4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg>) : (<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg>)}</button></div> )}
            {hasStarted && !isDesktop && !dialogueOpen && ( <><VisualJoystick active={joystickVisual.active} x={joystickVisual.currentX} y={joystickVisual.currentY} origin={{ x: joystickVisual.originX, y: joystickVisual.originY }} /><div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-full text-center px-4 text-white/50 text-sm font-mono pointer-events-none no-select">Left: Drag to Move • Right: Drag to Look</div></> )}
            {hasStarted && canInteractDoor && !houseDoorOpen && !dialogueOpen && ( <div className="absolute bottom-20 left-1/2 transform -translate-x-1/2 z-50"><button onClick={handleOpenDoor} className="bg-white text-black px-6 py-3 rounded-full font-bold shadow-lg animate-bounce active:scale-95 transition-transform" style={{ touchAction: 'manipulation' }}>OPEN DOOR</button></div> )}
            {hasStarted && canInteractNPC && !dialogueOpen && ( <div className="absolute bottom-32 left-1/2 transform -translate-x-1/2 z-50"><button onClick={handleStartDialogue} className="bg-yellow-400 text-black px-6 py-3 rounded-full font-bold shadow-lg animate-bounce active:scale-95 transition-transform tracking-widest" style={{ touchAction: 'manipulation' }}>FALAR</button></div> )}
            {dialogueOpen && ( <DialogueOverlay nodeKey={dialogueNode} onOptionSelect={handleDialogueOption} onClose={handleCloseDialogue} /> )}
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (!rootElement) { throw new Error("Could not find root element to mount to"); }
      const root = ReactDOM.createRoot(rootElement);
      root.render( <React.StrictMode> <GameApp /> </React.StrictMode> );
    </script>
  </body>
